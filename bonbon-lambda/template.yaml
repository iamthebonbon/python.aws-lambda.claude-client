AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  bonbon-lambda

  Sample SAM Template for bonbon-lambda


Globals:
  Function:
    Timeout: 3
    LoggingConfig:
      LogFormat: JSON

Resources:
  BonBonApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        ApiKeyRequired: true

  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: app.lambda_handler
      Runtime: python3.14
      Architectures:
      - x86_64
      Timeout: 30
      Environment:
        Variables:
          ANTHROPIC_API_KEY: "{{resolve:ssm:/bonbon-lambda/anthropic-api-key}}"
      Events:
        HelloWorld:
          Type: Api
          Properties:
            Path: /hello
            Method: get
            RestApiId: !Ref BonBonApi
        HelloWorldPost:
          Type: Api
          Properties:
            Path: /hello
            Method: post
            RestApiId: !Ref BonBonApi

  BonBonApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: BonBonApiProdStage
    Properties:
      Name: !Sub "${AWS::StackName}-ApiKey"
      Enabled: true
      StageKeys:
        - RestApiId: !Ref BonBonApi
          StageName: Prod

  BonBonUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: BonBonApiProdStage
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-UsagePlan"
      ApiStages:
        - ApiId: !Ref BonBonApi
          Stage: Prod

  BonBonUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref BonBonApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref BonBonUsagePlan

Outputs:
  HelloWorldApi:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${BonBonApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
  HelloWorldFunction:
    Description: Hello World Lambda Function ARN
    Value: !GetAtt HelloWorldFunction.Arn
  HelloWorldFunctionIamRole:
    Description: Implicit IAM Role created for Hello World function
    Value: !GetAtt HelloWorldFunctionRole.Arn
  BonBonApiKeyId:
    Description: API Key ID (retrieve value via CLI or console)
    Value: !Ref BonBonApiKey

