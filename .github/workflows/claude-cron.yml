name: Claude Cron — Auto-pick Issue

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude on open issues
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
        prompt: |
          Use `gh issue list --state open --assignee ""` to find open unassigned issues in this repo.
          Pick the most actionable one, implement the fix on a new branch, and open a pull request.
          Comment on the issue linking the PR. If there are no open issues, do nothing.