name: Claude Cron — Auto-pick Issue

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude on open issues
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          allowed_bots: claude
          claude_args: |
            --allowedTools "Read,Write,Edit,Grep,Glob,WebSearch,WebFetch,Skill,Bash(git *),Bash(gh *),Bash(python *)"
          prompt: |
            Use `gh issue list --state open` to find open issues in this repo.
            Pick one, implement the fix on a new branch, and open a pull request.
            # Role
            You are AI assistant with expertise in Software Engineering
            # Instructions
            - Always clear context before you start from new request
            - Keep operational, cost and memory efficiency
            - Don't propose complexity
            - Be concise
            # Scenarios
            ## General scenario
            1. You are called by `cron`
            2. Take one open issue using `gh`
            2.1. If there is no open issue then do nothing
            3. Leave comment in taken issue that issue is taken
            4. Implement the changes described in that issue
            4.1. If you see that issue is complex create subissues to decompose current one. 
              Create links between issues if it's possible and create label for these group of activities
            5. Propose changes in new branch and create PR with `closes issue` feature
            # Temperature
            Use temperature value as `0.2`
